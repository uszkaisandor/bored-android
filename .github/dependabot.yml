version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      androidx:
        patterns:
          - "androidx.*"
      kotlin-and-ksp:
        patterns:
          - "org.jetbrains.kotlin*"
          - "com.google.devtools.ksp*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
